<div class="card shadow border-0 bg-dark text-white">

    <div class="card-body p-4">
        <h3 class="card-tittle text-center mb-4">Agregar nuevo usuario</h3>

        <form [formGroup]="form" (submit)="enviarDatos()">
            <div class="mb-3">
                <label class="form-label">Nombre: </label>
                <input type="text" class="form-control bg-dark text-success border border-success"
                    formControlName="nombre" placeholder="Nombre">
            </div>


            <div class="mb-3">
                <label class="form-label">Apellido Paterno</label>
                <input type="text" class="form-control bg-dark border border-success text-success"
                    formControlName="apellidoPaterno" placeholder="Apellido Paterno">

            </div>
            <div class="mb-3">
                <label class="form-label">Apellido Materno</label>
                <input type="text" class="form-control bg-dark border border-success text-success"
                    formControlName="apellidoMaterno" placeholder="Apellido Materno">


            </div>

            <div class="mb-3">
                <label class="form-label text-white fs-5">Fecha de nacimiento</label><br>
                <input type="date" min="1930-01-01" max="2007-12-12"
                    class="form-control bg-dark border border-success text-success" onkeydown="return false" formControlName="fechaNacimiento">

            </div>

            <div class="mb-3">
                <label class="form-label">CURP</label>
                <input type="text" class="form-control bg-dark border border-success text-success"
                    formControlName="CURP" placeholder="Apellido Paterno" formControlName="CURP">

            </div>

            <div class="mb-3">
                <label class="form-label">Sexo</label> <br>
                <input class="form-check-input" type="radio" name="radioSexo" id="radiosexo1" value="Ma" checked
                    formControlName="sexo"><label class="pe-2 text-success" th:field="*{Sexo}"> Masculino</label> <br>
                <input class="form-check-input" type="radio" name="radioSexo" id="radiosexo2" value="FE"
                    formControlName="sexo"><label class="text-success"> Femenino</label>

            </div>

            <div class="mb-3">
                <label class="form-label text-white fs-5">Username</label><br>
                <input class="form-control bg-dark border border-success text-success">

            </div>

            <div class="mb-3">
                <label class="form-label text-white fs-5">Rol</label>
                <select  class="form-select form-select-sm w-25 bg-dark text-success border-success">

                    <option value=0 selected> Seleccione un Rol</option>
                    @for (rol of roles; track rol.idRol) {

                    <option [value]="rol.idRol" [text]="rol.NombreRol"></option>

                    }
                </select>


            </div>

            <div class="mb-3">
                <label class="form-label text-white fs-5">Celular</label><br>
                <input class="form-control bg-dark border border-success text-success">

            </div>
            <div class="mb-3">
                <label class="form-label text-white fs-5">Número telefónico</label><br>
                <input class="form-control bg-dark border border-success text-success">

            </div>

            <div class="mb-3">
                <label class="form-label text-white fs-5">Correo</label><br>
                <input class="form-control bg-dark border border-success text-success">

            </div>

            <div class="mb-3">
                <label class="form-label text-white fs-5">Contraseña</label><br>
                <input class="form-control bg-dark border border-success text-success">

            </div>


            <div class="mb-3">
                <label class="form-label text-white fs-5">Pais</label>
                <select id="ddlpais" class="form-select form-select-sm w-25 bg-dark text-success border-success" (change)="cambioPais($event)">

                    <option value=0 selected> Seleccione un pais</option>
                    @for (pais of paises; track pais.idPais) {

                    <option id="idpais" [value]="pais.idPais" [text]="pais.Nombre"></option>

                    }
                </select>

            </div>
            <div class="mb-3">
                <label class="form-label text-white fs-5">Estado</label>
                <select id="ddlestado" class="form-select form-select-sm w-25 bg-dark text-success border-success" (change)="cambioEstado($event)">

                    <option value=0 selected> Seleccione un estado</option>
                    @for (estado of estados; track estado.idEstado) {

                    <option [value]="estado.idEstado" [text]="estado.Nombre"></option>

                    }
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label text-white fs-5">Municipio</label>
                <select id="ddlmunicipio" class="form-select form-select-sm w-25 bg-dark text-success border-success" (change)="cambioMunicipio($event)">

                    <option value=0 selected> Seleccione un estado</option>
                    @for (municipio of municipios; track municipio.idMunicipio) {

                    <option [value]=municipio.idMunicipio [text]=municipio.Nombre></option>

                    }
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label text-white fs-5">Colonia</label>
                <select id="ddlmunicipio" class="form-select form-select-sm w-25 bg-dark text-success border-success" >

                    <option value=0 selected> Seleccione una colonia</option>
                    @for (colonia of colonias; track colonia.idColonia) {

                    <option [value]=colonia.idColonia [text]=colonia.Nombre></option>

                    }
                </select>
            </div>

            <div>
                <button type="submit" class="btn btn-success btn-lg">Crear nuevo usuario</button>
            </div>

        </form>
    </div>

</div>

<script>
document.addEventListener('copy', (e) => e.preventDefault());
        document.addEventListener('paste', (e) => e.preventDefault());

        let idpais = document.getElementById("idpais").val;
    $(document).ready(function () {

            console.log("Se ha cargado correctamente la pagina");


            $("#ddlpais").change(function () {
                console.log("Ha cambiado la informacion");
                var idPais = $("#ddlpais").val();
                if (idPais != 0) {
                    $.ajax({
                        url: "http://localhost:8080/api/estado?idPais=" + idpais,
                        type: "GET",
                        dataType: 'json',
                        success: function (data, textStatus, jqXHR) {
                            console.log("Todo OK");
                            $("#ddlestado").empty();
                            $("#ddlestado").append("<option value=0 selected>Selecciona un estado</option>");
                            $.each(data.objects, function (i, estado) {
                                console.log(estado.Nombre)
                                $("#ddlestado").append("<option value=" + estado.idEstado + ">" + estado.Nombre + "</option>");
                            });
                        },
                        error: function (jqXHR, textStatus, errorThrown) {
                            alert("No se pudo procesar la tarea");
                        }
                    });
                } else {
                    $("#ddlestado").empty();
                    $("#ddlestado").append("<option value=0 selected>Seleccione un estado</option>");
                }
                //Agregar modificaciones para el municipio y colonia

            });
            
            


            $("#ddlestado").change(function () {
                console.log("Ha cambiado la informacion");
                var idEstado = $("#ddlestado").val();
                if (idEstado != 0) {

                    $.ajax({
                        url: "http://localhost:8080/api/municipio?idEstado=" + idEstado,
                        type: "GET",
                        dataType: 'json',
                        success: function (data, textStatus, jqXHR) {
                            console.log("Todo OK");
                            $("#ddlmunicipio").empty();
                            $("#ddlmunicipio").append("<option value=0 selected>Selecciona un municipio</option>");
                            $.each(data.objects, function (i, municipio) {
                                console.log(municipio.Nombre)
                                $("#ddlmunicipio").append("<option value=" + municipio.idMunicipio + ">" + municipio.Nombre + "</option>");
                            });
                        },
                        error: function (jqXHR, textStatus, errorThrown) {
                            alert("No se pudo procesar la tarea");
                        }
                    });
                } else {
                    $("#ddlmunicipio").empty();
                    $("#ddlmunicipio").append("<option value=0 selected>Seleccione un municipio</option>");
                }
                //Agregar modificaciones para el municipio y colonia






            });





            $("#ddlmunicipio").change(function () {
                console.log("Ya cambie, municipio");
                var idMunicipio = $("#ddlmunicipio").val();
                console.log(idMunicipio);
                if (idMunicipio != 0) {
                    $.ajax({
                        url: "http://localhost:8080/api/colonia?idMunicipio=" + idMunicipio,
                        type: 'GET',
                        dataType: 'json',
                        success: function (data, textStatus, jqXHR) {
                            console.log("Todo ok, municipio");
                            $("#ddlcolonia").empty();
                            $("#ddlcolonia").append("<option value= 0 selected> selecciona tu colonia</option>");
                            $.each(data.objects, function (i, colonia) {
                                console.log(colonia.Nombre);
                                console.log(colonia.CodigoPostal);

                                $("#ddlcolonia").append("<option value=" + colonia.idColonia + " data-cp=" + colonia.CodigoPostal + ">" + colonia.Nombre + "</option>");

//                                document.getElementById("#ddlcodigopostal").value(data - cp);
//                                $("#ddlcodigopostal").append("<input >" + data - cp + "</input>");


                            });
                        },
                        error: function (jqXHR, textStatus, errorThrown) {
                            alert("No se pudo procesar la tarea, municipio");
                        }
                    });
                } else {
                    $("#ddlcolonia").empty();
                    $("#ddlcolonia").append("<option value= 0 selected> selecciona tu colonia</option>");
                    $("#codigopostal").val("");
                }


            });


            $("#ddlcolonia").change(function () {
                $("#codigopostal").val($("#ddlcolonia option:selected").data("cp"));
            });





        });
</script>
